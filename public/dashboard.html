<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Sync-Up</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div class="app-layout">

  <!-- ═══════════════ SIDEBAR ═══════════════ -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </div>
      <span class="sidebar-logo-text">Sync-Up</span>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="sidebar-nav-item active">
        <!-- grid icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar" id="userAvatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="userName">Loading…</div>
          <div class="sidebar-user-email" id="userEmail"></div>
        </div>
      </div>
      <button class="sidebar-logout" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign out
      </button>
    </div>
  </aside>

  <!-- ═══════════════ MAIN CONTENT ═══════════════ -->
  <div class="main-content">
    <header class="page-header">
      <div class="page-header-left">
        <h1 class="page-title">My Projects</h1>
      </div>
      <button class="btn btn-primary" id="newProjectBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Project
      </button>
    </header>

    <main class="page-body">
      <div id="projectsGrid" class="projects-grid">
        <div class="page-loader"><div class="spinner"></div></div>
      </div>
    </main>
  </div>
</div>

<!-- ═══════════════ NEW PROJECT MODAL ═══════════════ -->
<div class="modal-overlay" id="newProjectModal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">New Project</h2>
      <button class="modal-close" data-close="newProjectModal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label" for="projTitle">Project title <span style="color:var(--danger)">*</span></label>
        <input id="projTitle" type="text" class="form-input" placeholder="e.g. Website Redesign" maxlength="80" />
      </div>
      <div class="form-group">
        <label class="form-label" for="projDesc">Description</label>
        <textarea id="projDesc" class="form-textarea" placeholder="What is this project about?"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" for="projDue">Due date</label>
        <input id="projDue" type="date" class="form-input" />
      </div>
      <div id="projError" class="form-error" style="display:none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close="newProjectModal">Cancel</button>
      <button class="btn btn-primary" id="createProjectBtn">Create Project</button>
    </div>
  </div>
</div>

<!-- ═══════════════ DELETE CONFIRM MODAL ═══════════════ -->
<div class="modal-overlay" id="deleteProjectModal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Delete Project</h2>
      <button class="modal-close" data-close="deleteProjectModal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <p>Are you sure you want to delete <strong id="deleteProjectName"></strong>? This cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close="deleteProjectModal">Cancel</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script type="module" src="js/dashboard.js"></script>
</body>
</html>
