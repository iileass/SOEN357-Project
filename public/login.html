<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Sync-Up</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <!-- lightning bolt icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </div>
      <span class="auth-logo-text">Sync-Up</span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your workspace</p>

    <div id="authError" class="auth-error"></div>

    <form id="loginForm" class="auth-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input id="email" type="email" class="form-input" placeholder="you@example.com" required autocomplete="email" />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" type="password" class="form-input" placeholder="••••••••" required autocomplete="current-password" />
      </div>

      <button type="submit" id="submitBtn" class="btn btn-primary btn-lg auth-submit w-full">
        Sign in
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="signup.html">Create one</a>
    </p>
  </div>

  <script type="module">
    import { redirectIfAuthed, login } from "./js/auth.js";

    redirectIfAuthed();

    const form     = document.getElementById("loginForm");
    const errorBox = document.getElementById("authError");
    const submitBtn = document.getElementById("submitBtn");

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.add("visible");
    }
    function clearError() { errorBox.classList.remove("visible"); }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearError();

      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) { showError("Please fill in all fields."); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = "Signing in…";

      try {
        await login(email, password);
        window.location.href = "/dashboard.html";
      } catch (err) {
        const map = {
          "auth/invalid-credential":    "Invalid email or password.",
          "auth/user-not-found":        "No account found with this email.",
          "auth/wrong-password":        "Incorrect password.",
          "auth/too-many-requests":     "Too many attempts. Please try again later.",
          "auth/invalid-email":         "Please enter a valid email address.",
        };
        showError(map[err.code] || "Sign-in failed. Please try again.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign in";
      }
    });
  </script>
</body>
</html>
