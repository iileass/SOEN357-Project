<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sync-Up</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .splash {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f1ff 0%, #e8eaff 50%, #f4f5fb 100%);
    }
    .splash-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .splash-icon {
      width: 56px; height: 56px;
      background: var(--primary);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .splash-icon svg { width: 28px; height: 28px; fill: #fff; }
    .splash-name { font-size: 1.5rem; font-weight: 700; color: var(--text); }
    .splash-spinner { margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="splash">
    <div class="splash-logo">
      <div class="splash-icon">
        <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </div>
      <span class="splash-name">Sync-Up</span>
      <div class="splash-spinner">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth } from "./js/firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "/dashboard.html";
      } else {
        window.location.href = "/login.html";
      }
    });
  </script>
</body>
</html>
